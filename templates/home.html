<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

/* Navbar */
.navbar {
    padding: 15px 30px;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
}

.main {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
    flex-wrap: wrap;
}

.card {
    width: 400px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: orange;
    border: none;
    border-radius: 8px;
    color: white;
}

.loader {
    display: none;
    text-align: center;
}

.spinner {
    border: 4px solid #ccc;
    border-top: 4px solid white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="navbar">
    <div>🎓 AI Predictor</div>
    <div><a href="/" style="color:white;">Home</a></div>
</div>

<div class="main">

<!-- FORM -->
<div class="card">
<h2>Predict Score</h2>

<form action="/predictdata" method="POST" onsubmit="showLoader()">

<select name="gender" required>
<option value="" disabled selected>Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select name="race_ethnicity" required>
<option value="" disabled selected>Race</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<select name="parental_level_of_education" required>
<option value="" disabled selected>Education</option>
<option value="some high school">Some High School</option>
<option value="high school">High School</option>
<option value="some college">Some College</option>
<option value="associate's degree">Associate</option>
<option value="bachelor's degree">Bachelor</option>
<option value="master's degree">Master</option>
</select>

<select name="lunch" required>
<option value="" disabled selected>Lunch</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>

<select name="test_preparation_course" required>
<option value="" disabled selected>Test Prep</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<input type="number" name="reading_score" placeholder="Reading Score" required>
<input type="number" name="writing_score" placeholder="Writing Score" required>

<button type="submit">🚀 Predict</button>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Analyzing...</p>
</div>

</form>
</div>

<!-- RESULT -->
{% if results %}
<div class="card">
<h2>📊 Result</h2>

<h1>{{ results }}</h1>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
        labels: ['Score'],
        datasets: [{
            label: 'Prediction',
            data: [{{ results }}],
        }]
    }
});
</script>

</div>
{% endif %}

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
